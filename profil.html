<style>
  :root {
    --green: #1DB954;
    --green-dim: rgba(29,185,84,0.1);
    --green-glow: rgba(29,185,84,0.2);
    --dark: #080A0C;
    --dark2: #0F1214;
    --dark3: #161A1E;
    --border: rgba(255,255,255,0.07);
    --text: #E8EAE8;
    --muted: rgba(232,234,232,0.45);
    --ease: cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRAIN */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* DECO */
  .bg-deco {
    position: fixed; top: -200px; right: -200px;
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(29,185,84,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .bg-deco2 {
    position: fixed; bottom: -150px; left: -150px;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(29,185,84,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* NAV */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    background: rgba(8,10,12,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 20px; letter-spacing: 0.04em;
    color: var(--text); text-decoration: none;
  }
  .nav-logo span { color: var(--green); }
  .nav-back {
    font-size: 12px; color: var(--muted); text-decoration: none;
    letter-spacing: 0.06em; transition: color 0.2s;
    font-weight: 600;
  }
  .nav-back:hover { color: var(--green); }

  /* WRAP */
  .wrap {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto;
    padding: 100px 20px 80px;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  .anim-1 { opacity: 0; animation: fadeUp 0.5s var(--ease) 0.1s forwards; }
  .anim-2 { opacity: 0; animation: fadeUp 0.5s var(--ease) 0.25s forwards; }
  .anim-3 { opacity: 0; animation: fadeUp 0.5s var(--ease) 0.4s forwards; }
  .anim-4 { opacity: 0; animation: fadeUp 0.5s var(--ease) 0.55s forwards; }
  .anim-5 { opacity: 0; animation: fadeUp 0.5s var(--ease) 0.7s forwards; }
  .anim-6 { opacity: 0; animation: fadeUp 0.5s var(--ease) 0.85s forwards; }

  /* HEADER PROFIL */
  .profil-header {
    text-align: center;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .profil-tag {
    display: inline-block;
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--green);
    background: var(--green-dim);
    border: 1px solid rgba(29,185,84,0.2);
    padding: 5px 14px; border-radius: 100px;
    margin-bottom: 24px;
  }
  .profil-emoji {
    font-size: 72px; display: block; margin-bottom: 16px;
    animation: scaleIn 0.6s var(--ease) 0.15s both;
  }
  .profil-prenom {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(15px, 4vw, 20px);
    font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--text);
    opacity: 0.7;
    margin-bottom: 8px;
  }
  .profil-nom {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(40px, 10vw, 64px);
    text-transform: uppercase; letter-spacing: -0.01em;
    line-height: 0.95; color: var(--green);
    margin-bottom: 20px;
  }
  .profil-accroche {
    font-size: clamp(16px, 3.5vw, 19px);
    color: var(--text);
    opacity: 0.75;
    font-style: italic;
    line-height: 1.55; max-width: 480px; margin: 0 auto;
  }

  /* BLOCS */
  .bloc {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--dark2);
    overflow: hidden;
  }
  .bloc-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.025);
  }
  .bloc-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
    animation: shimmer 2s infinite;
  }
  .bloc-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--green);
  }
  .bloc-body {
    padding: 24px;
    font-size: 16px; color: var(--text); line-height: 1.8;
  }
  .bloc-body p + p { margin-top: 14px; }
  .bloc-body b {
    color: var(--green);
    font-weight: 700;
  }

  /* BLOC EXERCICE — orange dégradé */
  .bloc-exercice {
    border: none;
    background: linear-gradient(135deg, rgba(255,149,0,0.12) 0%, rgba(255,107,43,0.1) 60%, rgba(255,61,0,0.08) 100%);
    box-shadow: 0 0 0 1.5px rgba(255,107,43,0.35), 0 4px 24px rgba(255,107,43,0.08);
  }
  .bloc-exercice .bloc-header {
    background: linear-gradient(135deg, rgba(255,149,0,0.15) 0%, rgba(255,107,43,0.12) 100%);
    border-bottom: 1px solid rgba(255,107,43,0.2);
  }
  .bloc-exercice .bloc-dot {
    background: linear-gradient(135deg, #FF9500, #FF3D00);
    animation: shimmer 1.5s infinite;
  }
  .bloc-exercice .bloc-label {
    background: linear-gradient(135deg, #FF9500 0%, #FF6B2B 60%, #FF3D00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .bloc-exercice .bloc-body {
    font-size: 17px;
  }
  .bloc-exercice .bloc-body b {
    background: linear-gradient(135deg, #FF9500 0%, #FF6B2B 60%, #FF3D00 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* CITATION COACH */
  .citation {
    margin: 24px 0 0;
    padding: 20px 24px;
    border-left: 3px solid var(--green);
    background: rgba(29,185,84,0.07);
    border-radius: 0 10px 10px 0;
    font-style: italic;
    font-size: 16px;
    color: var(--text);
    line-height: 1.7;
  }
  .citation-author {
    margin-top: 10px;
    font-style: normal;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.15em;
    color: var(--green);
    text-transform: uppercase;
  }

  /* CTA */
  .cta-block {
    margin-top: 40px;
    padding: 32px 24px;
    border: 1px solid rgba(29,185,84,0.25);
    border-radius: 12px;
    background: var(--dark2);
    text-align: center;
  }
  .cta-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--green); margin-bottom: 14px;
  }
  .cta-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: clamp(24px, 6vw, 36px);
    text-transform: uppercase; line-height: 1.05;
    margin-bottom: 12px;
  }
  .cta-sub {
    font-size: 14px; color: var(--muted); line-height: 1.7;
    margin-bottom: 24px; max-width: 400px; margin-left: auto; margin-right: auto;
  }
  .cta-items {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 28px;
    text-align: left;
  }
  .cta-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 14px; color: var(--text);
  }
  .cta-item::before {
    content: '✓';
    color: var(--green); font-weight: 700;
    flex-shrink: 0; margin-top: 1px;
  }
  .btn-wa {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--green); color: #000;
    padding: 16px 28px; border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 16px; letter-spacing: 0.08em;
    text-transform: uppercase; text-decoration: none;
    transition: all 0.2s var(--ease);
    width: 100%; justify-content: center;
  }
  .btn-wa:hover {
    background: #22d45f; transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(29,185,84,0.35);
  }
  .btn-wa svg { width: 20px; height: 20px; flex-shrink: 0; }
  .cta-mention {
    margin-top: 14px; font-size: 12px; color: var(--muted); line-height: 1.6;
  }
  .price-badge {
    display: inline-block;
    background: rgba(29,185,84,0.12);
    border: 1px solid rgba(29,185,84,0.25);
    color: var(--green);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 22px; letter-spacing: 0.05em;
    padding: 6px 20px; border-radius: 100px;
    margin-bottom: 20px;
  }

  @media(min-width: 480px) {
    .btn-wa { width: auto; }
    .wrap { padding: 100px 32px 80px; }
    .cta-items { max-width: 320px; margin-left: auto; margin-right: auto; }
  }

  /* FOOTER */
  .footer {
    position: relative; z-index: 1;
    text-align: center; padding: 28px 16px 32px;
    border-top: 1px solid var(--border);
    margin-top: 20px;
  }
  .footer p { font-size: 11px; color: rgba(255,255,255,0.18); letter-spacing: .5px; line-height: 1.8; }
  .footer em { font-size: 11px; color: rgba(255,255,255,0.13); font-style: italic; letter-spacing: .3px; }
</style>
</head>
